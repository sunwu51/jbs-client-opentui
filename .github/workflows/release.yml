name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: macos-latest
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Install Dependencies
        run: bun install

      - name: Build Packages
        run: bun run build:npm

      - name: Verify Darwin Signatures
        run: |
          codesign -dv --verbose=4 dist/npm/jbs-client-darwin-arm64/bin/jbs-client
          codesign -dv --verbose=4 dist/npm/jbs-client-darwin-x64/bin/jbs-client

      - name: Prepare Release Assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets

          while IFS= read -r dir; do
            name="$(basename "$dir")"
            if [ "$name" = "jbs-client" ]; then
              continue
            fi

            (
              cd "$dir/bin"
              zip -r "../../../../release-assets/${name}.zip" .
            )
          done < <(find dist/npm -mindepth 1 -maxdepth 1 -type d | sort)

          ls -lah release-assets

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.zip
          generate_release_notes: true

      - name: Publish npm Packages
        run: bun run publish:npm
